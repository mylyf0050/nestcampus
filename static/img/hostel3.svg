<rect x="100" y="40" width="200" height="165" rx="4" fill="url(#facade3)"/>
<rect x="82" y="30" width="236" height="12" fill="#D9584B"/>

<g>
  <rect x="122" y="62" width="26" height="26" rx="2" fill="url(#win3a)"/>
  <rect x="164" y="62" width="26" height="26" rx="2" fill="#20345C"/>
  <rect x="206" y="62" width="26" height="26" rx="2" fill="url(#win3a)"/>
  <rect x="248" y="62" width="26" height="26" rx="2" fill="#20345C"/>

  <rect x="122" y="104" width="26" height="26" rx="2" fill="#20345C"/>
  <rect x="164" y="104" width="26" height="26" rx="2" fill="url(#win3b)"/>
  <rect x="206" y="104" width="26" height="26" rx="2" fill="#20345C"/>
  <rect x="248" y="104" width="26" height="26" rx="2" fill="url(#win3a)"/>

  <rect x="122" y="146" width="26" height="26" rx="2" fill="url(#win3a)"/>
  <rect x="248" y="146" width="26" height="26" rx="2" fill="url(#win3b)"/>
</g>

<!-- central grand entrance -->
<rect x="170" y="146" width="60" height="59" fill="#0A1226"/>
<rect x="170" y="146" width="60" height="5" fill="#E8A33D"/>
<rect x="198" y="160" width="4" height="45" fill="#E8A33D" opacity="0.6"/>
<circle cx="200" cy="175" r="3" fill="#F4C673"/>

<!-- steps -->
