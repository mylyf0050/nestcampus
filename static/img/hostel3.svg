<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sky3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#2C4368"/>
    <stop offset="100%" stop-color="#182746"/>
  </linearGradient>
  <linearGradient id="facade3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#17284C"/>
    <stop offset="100%" stop-color="#0F1C38"/>
  </linearGradient>
  <linearGradient id="win3a" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#F4C673"/>
    <stop offset="100%" stop-color="#E8A33D"/>
  </linearGradient>
  <linearGradient id="win3b" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#E8836F"/>
    <stop offset="100%" stop-color="#D9584B"/>
  </linearGradient>
  <linearGradient id="ground3" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#233657"/>
    <stop offset="100%" stop-color="#0E1830"/>
  </linearGradient>
  <radialGradient id="glow3" cx="15%" cy="20%" r="30%">
    <stop offset="0%" stop-color="#E8A33D" stop-opacity="0.25"/>
    <stop offset="100%" stop-color="#E8A33D" stop-opacity="0"/>
  </radialGradient>
</defs>

<rect width="400" height="250" fill="url(#sky3)"/>
<circle cx="55" cy="45" r="30" fill="url(#glow3)"/>

<rect x="0" y="205" width="400" height="45" fill="url(#ground3)"/>
<rect x="0" y="205" width="400" height="4" fill="#0A1226"/>

<!-- symmetrical central block with wings -->
<rect x="60" y="70" width="60" height="135" fill="#122142"/>
