<svg viewBox="0 0 400 250" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="sky2" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#233657"/>
    <stop offset="100%" stop-color="#152541"/>
  </linearGradient>
  <linearGradient id="facadeA" x1="0" y1="0" x2="0" y2="1">
    <stop offset="0%" stop-color="#152541"/>
    <stop offset="100%" stop-color="#0F1C38"/>
  </linearGradient>
  <linearGradient id="facadeB" x1="0" y1="0" x2="0" y2="1">
