{% extends "base.html" %}
{% block title %}Log in &mdash; NestCampus{% endblock %}
{% block content %}
<section class="section">
  <p class="eyebrow">Welcome back</p>
  <h1 style="font-size:1.8rem;">Log in</h1>

  {% with messages = get_flashed_messages() %}
    {% if messages %}<p style="color:var(--coral);">{{ messages[0] }}</p>{% endif %}
  {% endwith %}

  <form class="card-form" method="POST">
    <label for="email">Email</label>
    <input type="text" id="email" name="email" placeholder="you@example.com" required>
    <label for="password">Password</label>
    <input type="text" id="password" name="password" placeholder="Your password" required>
    <div style="margin-top:22px;">
      <button type="submit" class="btn-gold">Log in</button>
    </div>
    <p style="color:var(--muted);font-size:.85rem;margin-top:16px;">Don't have an account? <a href="{{ url_for('signup') }}" style="color:var(--gold);">Sign up</a></p>
  </form>
</section>
{% endblock %}
